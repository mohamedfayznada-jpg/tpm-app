<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Factory OS | نظام إدارة المصنع الذكي</title>
    <meta name="theme-color" content="#0a1128">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
</head>
<body>
    <div class="header" id="mainHeader">
        <div class="header-top">
            <div class="status-dot"></div>
            <div class="header-titles">
                <h1>نظام إدارة المصنع</h1>
                <p>إشراف: م. محمد فايز</p>
            </div>
            <button class="theme-toggle" onclick="toggleDarkMode()">التباين</button>
        </div>
        <div class="search-bar-container">
            <input type="text" id="globalSearchInput" class="form-control search-input" placeholder="بحث شامل (تاجات، خامات، مهام)..." onkeyup="executeGlobalSearch()">
            <button class="btn btn-primary btn-camera" onclick="document.getElementById('barcodeInput').click()">مسح</button>
            <input type="file" id="barcodeInput" accept="image/*" capture="environment" style="display:none;" onchange="scanBarcodeFromImage(event)">
            <div id="searchResults" class="search-results-box"></div>
        </div>
        <div class="cloud-status" id="cloudStatus">جاري الاتصال...</div>
    </div>

    <div class="modal-overlay" id="imageSourceModal">
        <div class="modal-content">
            <h3 class="card-title">اختر مصدر الصورة</h3>
            <button class="btn btn-outline full-width" style="margin-bottom:10px;" onclick="triggerCamera()">الكاميرا 📸</button>
            <button class="btn btn-outline full-width" style="margin-bottom:10px;" onclick="triggerGallery()">المعرض 🖼️</button>
            <button class="btn btn-danger full-width" onclick="document.getElementById('imageSourceModal').style.display='none'">إلغاء</button>
        </div>
    </div>

    <div class="modal-overlay" id="aiModal">
        <div class="modal-content" style="max-height:80vh; overflow-y:auto;">
            <h3 class="card-title">المساعد الذكي (AI)</h3>
            <div id="aiModalText" class="ai-text-box">جاري التحليل...</div>
            <button class="btn btn-primary full-width" style="margin-top:15px;" onclick="document.getElementById('aiModal').style.display='none'">إغلاق</button>
        </div>
    </div>

    <div class="container screen active" id="loginScreen">
        <div class="card login-card" style="margin-top: 50px;">
            <h2 style="color:var(--gold); margin-bottom:20px;">الدخول للنظام الصناعي</h2>
            <input type="text" id="loginUsername" class="form-control" placeholder="اسم المستخدم">
            <input type="password" id="loginPassword" class="form-control" placeholder="كلمة المرور">
            <input type="text" id="displayName" class="form-control" placeholder="الاسم الكامل">
            <button class="btn btn-primary full-width" onclick="login()">دخول آمن</button>
        </div>
    </div>

    <div class="container screen" id="homeScreen">
        <div class="dashboard-stats">
            <div class="card stat-card"><div class="stat-value primary-text" id="homeAvgScore">0%</div><div class="stat-label">كفاءة المصنع</div></div>
            <div class="card stat-card"><div class="stat-value danger-text" id="homeOpenTags">0</div><div class="stat-label">أعطال مفتوحة</div></div>
            <div class="card stat-card"><div class="stat-value success-text" id="homeClosedTags">0</div><div class="stat-label">أعطال مغلقة</div></div>
        </div>
        <h3 class="section-title">مراقبة الأقسام</h3>
        <div id="homeDeptGrid" class="grid-layout"></div>
        <div class="card" style="margin-top: 20px;">
            <h3 class="card-title" style="text-align:center;">لوحة أبطال الجودة</h3>
            <div id="podiumContainer" class="podium-container"></div>
            <div id="usersLeaderboardContainer" class="leaderboard-list"></div>
        </div>
    </div>

    <div class="container screen" id="auditScreen">
        <div class="card sticky-header" style="padding:15px;">
            <h3 id="auditStepTitle" style="color:var(--gold); margin-bottom:10px; font-size:16px;"></h3>
            <div class="progress-track"><div class="progress-fill" id="auditProgressBar"></div></div>
        </div>
        <div id="auditItemsContainer"></div>
        <div class="row-flex" style="margin-top:15px;">
            <button class="btn btn-success flex-2" onclick="finishCurrentStep()">حفظ وإكمال</button>
            <button class="btn btn-danger flex-1" onclick="skipCurrentStep()">تخطي</button>
        </div>
    </div>

    <div class="container screen" id="tagsScreen">
        <h3 class="section-title">إدارة التاجات</h3>
        <div class="card">
            <h4 style="color:var(--gold); margin-bottom:10px;">إصدار تاج:</h4>
            <select id="newTagDept" class="form-control"></select>
            <input type="text" id="newTagMachine" class="form-control" placeholder="الماكينة">
            <div style="position: relative;">
                <input type="text" id="newTagDesc" class="form-control" placeholder="وصف العطل..." style="padding-left: 35px;">
                <span onclick="startVoiceRecognition('newTagDesc')" style="position: absolute; left: 10px; top: 10px; cursor: pointer; font-size: 18px;">🎤</span>
            </div>
            <select id="newTagColor" class="form-control">
                <option value="red">أحمر (صيانة)</option>
                <option value="blue">أزرق (إنتاج)</option>
            </select>
            <button class="btn btn-primary full-width" onclick="addNewTag()">إصدار وحفظ</button>
        </div>
        <div id="tagsListContainer"></div>
    </div>

    <div class="nav-bar" id="bottomNav" style="display: none;">
        <div class="nav-item" onclick="showScreen('homeScreen'); updateHomeDashboard();">🏠 الرئيسية</div>
        <div class="nav-item" onclick="showScreen('tagsScreen'); renderTags();">🔖 التاجات</div>
        <div class="nav-item" onclick="showScreen('historyScreen'); renderHistory();">📂 التقارير</div>
        <div class="nav-item" onclick="showScreen('settingsScreen');">⚙️ إعدادات</div>
    </div>

    <script src="app.js"></script>
</body>
</html>
